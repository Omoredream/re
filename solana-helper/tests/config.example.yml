rpcs:
  region: # 所在区域, 将会影响各个 RPC 的选择
  official:
    filter:
      offline: false # 尝试导入存在离线标记的 RPC
      CDN: true # 尝试导入存在 CDN 标记的 RPC
      多线: true # 尝试导入存在多线标记的 RPC
    httpRPCConfigFile: config_official_http # RPC 列表配置文件名
    websocketRPCConfigFile: config_official_websocket # RPC 列表配置文件名
  jupiter:
    filter:
      lv?: true # 未评级
      lv0: true # 毫无机会, 0
      lv1: true # 机会随缘, 0 - 90
      lv2: true # 略有机会, 90 - 180
      lv3: true # 机会寻常, 180 - 360
      lv4: true # 机会特多, 360 - 720
      lv5: true # 机会究极多, 720 - 1440
      lv6: true # 印钞机, 1440+
      valleyHourStart: 6 # 谷时起始小时, 谷时期间不应用等级筛选, start 和 end 都为 -1, 或 start > end 时, 不开启谷时特性
      valleyHourEnd: 14 # 谷时截止小时, 谷时期间不应用等级筛选, start 和 end 都为 -1, 或 start > end 时, 不开启谷时特性
      offline: false # 尝试导入存在离线标记的 RPC
      币池过多: false # 尝试导入存在币池过多标记的 RPC
      禁止套利: false # 尝试导入存在禁止套利标记的 RPC
    httpRPCConfigFile: config_jupiter_http # RPC 列表配置文件名
  jito:
    config:
      ip: # 用于连接到 Jito 的 IP 列表, 需保证这些 IP 被分配到程序可直接访问的网卡上
        - 1.2.3.4
        - 5.6.7.8
      uuid: # Jito 分配的 UUID, 可用于提示频率限制, 非必填
    filter:
      offline: false # 尝试导入存在离线标记的 RPC
      多线: true # 尝试导入存在多线标记的 RPC
    httpRPCConfigFile: config_jito_http # RPC 列表配置文件名

wallets:
  wif: # 私钥, 可选加密
  mnemonic: # 助记词
  pinataToken: # pinata 密钥, 用于在 IPFS 上存储文件

redis: # 具体参数见 https://goframe.org/docs/components/contrib-nosql-redis-config#%E9%85%8D%E7%BD%AE%E9%A1%B9%E8%AF%B4%E6%98%8E
  token: # 代币信息缓存
    address: 127.0.0.1:6379
    db: 0
    maxIdle: 0
    maxActive: 0
    idleTimeout: 5m
    maxConnLifetime: 1d
  addressLookupTable: # 地址查找表缓存
    address: 127.0.0.1:6379
    db: 1
    maxIdle: 0
    maxActive: 0
    idleTimeout: 5m
    maxConnLifetime: 1d
  arb: # 套利代币黑名单缓存
    address: 127.0.0.1:6379
    db: 8
    maxIdle: 0
    maxActive: 0
    idleTimeout: 5m
    maxConnLifetime: 1d

cache:
  token:
    medium: redis # mem: 内存缓存, redis: Redis 缓存
    duration: 1h # 缓存有效期
  addressLookupTable:
    medium: redis # mem: 内存缓存, redis: Redis 缓存
    duration: 1d # 缓存有效期

project:
  arb:
    debug: false # 是否开启调试日志
    derivationFrom: 0 # 用于绕过 Jito 频率限制的代付钱包派生起始序号 (包含)
    derivationTo: 10 # 用于绕过 Jito 频率限制的代付钱包派生截止序号 (不包含)
    alt: "DfvMfkE312Ah8gE8zZxBWyrUsiGRrsFN7fGQKey2HeBU" # 可选的自身钱包相关地址的地址查找表
    thirdPayer: true # 是否开启用于绕过 Jito 频率限制的代付钱包
    dynamicTip: true # 通过 CPI 支付小费
    balanceBase: 88 # 用于生成资金数量集的基础资金量
    balanceHalvedMaxRound: 9 # 用于生成资金数量集的资金衰减轮数, 每次衰减都会除以资金衰减指数, 如 88 SOL 的基础资金量配置 9 资金衰减轮数, 最多可衰减至 88/(1.75^9)=0.571_663_197 SOL
    balanceHalvedBase: 1.75 # 用于生成资金数量集的资金衰减指数
    balanceHalvedList: # 资金衰减列表, 会自动按从大到小的顺序填充进已生成资金数量集的合适位置, 当资金衰减轮数为 0 时, 则只使用此列表
      - 1
      - 5
      - 10
    profitToJitoTip: 85_00 # Jito 小费比例, 100_00 即 100%
    profitMin: 0 # 最小毛利润(未扣除签名费、Jito 小费), 单位 SOL
    jitoTipMax: 0.1 # 最大 Jito 小费, 单位 SOL
    parallel: 4 # 寻找套利机会的并行线程数
    extraCULimit: 35_000 # 额外的 CU limit, 尽量避免因附加的利润相关程序调用导致的计算单元耗尽
